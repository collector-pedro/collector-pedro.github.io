<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Set - Pedro's TCG Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <nav class="nav-container">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="18" stroke="#E63946" stroke-width="2.5"/>
                    <path d="M2 20 Q20 20 38 20" stroke="#E63946" stroke-width="2.5"/>
                    <circle cx="20" cy="20" r="5" fill="#E63946"/>
                    <circle cx="20" cy="20" r="3" fill="white"/>
                </svg>
                <span>Pedro's TCG</span>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Início</a>
                <a href="index.html#colecao">Coleção</a>
                <a href="index.html#destaque">Destaque</a>
                <button id="themeToggle" class="theme-toggle" aria-label="Alternar tema">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">
                <i class="fas fa-bars"></i>
            </button>
        </nav>
    </header>

    <div class="set-page-header" id="setPageHeader">
        <div class="set-page-header-content">
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Voltar
            </a>
            <p class="section-eyebrow">✦ Expansão</p>
            <h1 class="set-page-title" id="setTitle">Base Set</h1>
            <p class="set-page-desc" id="setDescription">A edição que começou tudo</p>
            <div class="set-page-meta">
                <span id="setYear"><i class="far fa-calendar-alt"></i> 1999</span>
                <span id="setCount"><i class="fas fa-layer-group"></i> 102 cartas</span>
            </div>
        </div>
        <div class="set-page-cover">
            <img id="setCoverImg" src="" alt="Set Cover" onerror="this.style.display='none'">
        </div>
    </div>

    <div class="set-page-body">
        <div class="cards-filter">
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar carta...">
        </div>
        <div id="cardsGrid" class="cards-grid">
            <div class="loading-msg">Carregando cartas...</div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="18" stroke="#E63946" stroke-width="2.5"/>
                    <path d="M2 20 Q20 20 38 20" stroke="#E63946" stroke-width="2.5"/>
                    <circle cx="20" cy="20" r="5" fill="#E63946"/>
                    <circle cx="20" cy="20" r="3" fill="white"/>
                </svg>
                <div>
                    <strong>Pedro's TCG Collection</strong>
                    <p>Preservando a história do Pokémon TCG</p>
                </div>
            </div>
            <div class="footer-links">
                <a href="https://github.com/collector-pedro" target="_blank" aria-label="GitHub">
                    <i class="fab fa-github"></i>
                </a>
                <a href="#" target="_blank" aria-label="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="#" aria-label="Email">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2024 Pedro's Pokémon TCG Collection</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
