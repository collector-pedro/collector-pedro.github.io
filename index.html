<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro's Absol Collection</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎴</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <nav class="nav-container">
            <div class="logo">
                <span class="logo-text">Absol<span class="logo-accent">Collector</span></span>
            </div>
            <ul class="nav-menu">
                <li><a href="#home" class="nav-link active">Início</a></li>
                <li><a href="#colecao" class="nav-link">Coleção</a></li>
                <li><a href="#sobre" class="nav-link">Sobre</a></li>
            </ul>
            <button class="theme-toggle" id="themeToggle">🌓</button>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="hero-content">
                <h1 class="hero-title">Minha Coleção <span class="gradient-text">Absol</span></h1>
                <p class="hero-subtitle">Explorando as cartas mais raras e fascinantes do Pokémon Absol.</p>
                <a href="#colecao" class="btn btn-primary">Ver Coleção</a>
            </div>
            <div class="hero-image">
                <div class="absol-card">
                    <!-- Imagem usando emoji como fallback -->
                    <div class="card-placeholder">🎴</div>
                </div>
            </div>
        </section>

        <section class="stats">
            <div class="stats-container">
                <div class="stat-item">
                    <span class="stat-number" id="totalCards">0</span>
                    <span class="stat-label">Cartas</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="uniqueCards">0</span>
                    <span class="stat-label">Únicas</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="rareCards">0</span>
                    <span class="stat-label">Raras</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="completeSets">0</span>
                    <span class="stat-label">Sets</span>
                </div>
            </div>
        </section>

        <section id="colecao" class="collection">
            <div class="container">
                <h2 class="section-title">Minha <span class="gradient-text">Coleção</span></h2>
                
                <div class="filters">
                    <select id="setFilter" class="filter-select">
                        <option value="all">Todos os Sets</option>
                        <option value="base">Base Set</option>
                        <option value="fossil">Fossil</option>
                    </select>
                    <select id="rarityFilter" class="filter-select">
                        <option value="all">Todas Raridades</option>
                        <option value="common">Common</option>
                        <option value="uncommon">Uncommon</option>
                        <option value="rare">Rare</option>
                    </select>
                    <input type="text" id="searchInput" placeholder="Buscar carta..." class="search-input">
                </div>

                <div class="cards-grid" id="cardsGrid"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Pedro's Absol Collection</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
